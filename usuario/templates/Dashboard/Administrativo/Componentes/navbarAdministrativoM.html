        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false">
            <span class="fas fa-solid fa-bars" style="color: #FFFF;"></span>
        </button>
        <div class="navbar-collapse collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-3 mb-lg-0 menusidebar">
                <li class="nav-item ">
                    <a class="nav-link active navAd text-white" href="#imagenesActuales">
                        Imagenes Actuales
                    </a>
                </li>
                <li class="nav-item ">
                    <a class="nav-link text-white navAd" href="#noticiasActuales">
                        Noticias Actuales
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center justify-content-between">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 d-flex gap-2">
                    <li class="nav-item">
                        <a class="navHeaderIcon" data-widget="accesibilidad" role="button" id="accesibilidadId" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight" aria-controls="offcanvasRight" style="color: white;">

    </div>
</nav>

<script>
    document.addEventListener("DOMContentLoaded", function() {
      // Inicializar el scrollspy de Bootstrap
      var scrollSpy = new bootstrap.ScrollSpy(document.body, {
        target: '.navbar',
        offset: 50
      });

      // Controladores de eventos para los enlaces del navbar
      var navLinks = document.querySelectorAll('.navbar-nav .nav-link');
      navLinks.forEach(function(link) {
        link.addEventListener('click', function(event) {
          event.preventDefault(); // Evitar la acción predeterminada de navegación
          var targetId = this.getAttribute('href');
          var targetElement = document.querySelector(targetId);
          if (targetElement) {
            window.scrollTo({
              top: targetElement.offsetTop,
              behavior: 'smooth'
            });
          }
        });
      });
    });
  </script>
